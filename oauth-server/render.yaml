services:
  - type: web
    name: portfolio-decap-oauth
    runtime: node
    rootDir: oauth-server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: OAUTH_CALLBACK_URL
        sync: false
      - key: ORIGIN
        value: https://hallous-yassine.github.io
