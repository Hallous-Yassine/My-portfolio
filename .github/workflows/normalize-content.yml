name: Normalize content data

on:
  push:
    branches: [main]
    paths:
      - "public/data/**"

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Normalize portfolio JSON
        run: node scripts/normalize-portfolio-data.mjs

      - name: Commit normalized data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No normalization changes."
          else
            git commit -m "chore(cms): normalize portfolio data [skip ci]"
            git push
          fi
