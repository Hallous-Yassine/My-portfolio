# Decap CMS — Portfolio content manager
# Admin URL: https://hallous-yassine.github.io/My-portfolio/admin/
#
# OAuth: set DECAP_OAUTH_BASE_URL after deploying oauth-server/ (see docs/DECAP_CMS.md)
# Local editing: run `npm run cms` then open http://localhost:8080/admin/

backend:
  name: github
  repo: Hallous-Yassine/My-portfolio
  branch: main
  # Replace with your deployed OAuth server URL (no trailing slash), e.g. https://my-portfolio-oauth.onrender.com
  base_url: https://YOUR_OAUTH_SERVER_URL
  auth_endpoint: auth

local_backend: true

site_url: https://hallous-yassine.github.io
display_url: https://hallous-yassine.github.io/My-portfolio/
logo_url: /My-portfolio/logo.jpg

media_folder: public/assets
public_folder: /assets

slug:
  encoding: "unicode"
  clean_accents: true

publish_mode: simple

collections:
  - name: portfolio
    label: Portfolio Content
    files:
      - name: projects
        label: Projects
        file: public/data/projects.json
        format: json
        fields:
          - label: Projects
            name: projects
            widget: list
            label_singular: Project
            summary: "{{fields.id}} — {{fields.title}} ({{fields.category}})"
            fields:
              - { label: ID, name: id, widget: number, hint: "Unique number. CI auto-fixes order on deploy if needed." }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Date, name: date, widget: string, hint: "e.g. December 2025" }
              - label: Category
                name: category
                widget: select
                options:
                  - Web Development
                  - AI & Machine Learning
                  - Backend & IoT
                  - Mobile Development
                  - Systems Programming
                  - Cybersecurity
              - { label: Technologies, name: technologies, widget: list, field: { label: Technology, widget: string } }
              - { label: Highlights, name: highlights, widget: list, field: { label: Highlight, widget: string } }
              - { label: GitHub URL, name: github, widget: string }
              - { label: Cover Image, name: image, widget: image, hint: "Upload or pick from media library. Stored as /assets/..." }

      - name: experiences
        label: Experience
        file: public/data/experiences.json
        format: json
        fields:
          - label: Experience
            name: experience
            widget: list
            label_singular: Experience
            summary: "{{fields.id}} — {{fields.title}} @ {{fields.company}}"
            fields:
              - { label: ID, name: id, widget: number }
              - { label: Job Title, name: title, widget: string }
              - { label: Company, name: company, widget: string }
              - { label: Location, name: location, widget: string }
              - { label: Date, name: date, widget: string, hint: "e.g. July 2025 – August 2025" }
              - { label: Description, name: description, widget: text }
              - { label: Highlights, name: highlights, widget: list, field: { label: Highlight, widget: string } }
              - { label: Technologies, name: technologies, widget: list, field: { label: Technology, widget: string } }
              - { label: Image, name: image, widget: image }

      - name: certifications
        label: Certifications
        file: public/data/certifications.json
        format: json
        fields:
          - label: Certifications
            name: certifications
            widget: list
            label_singular: Certification
            summary: "{{fields.id}} — {{fields.title}}"
            fields:
              - { label: ID, name: id, widget: number }
              - { label: Title, name: title, widget: string }
              - { label: Issuer, name: issuer, widget: string }
              - { label: Date, name: date, widget: string }
              - { label: Credential ID, name: credentialId, widget: string, required: false }
              - { label: Credential URL, name: credentialUrl, widget: string, required: false, hint: "Leave empty to show 'Request Credential' button" }
              - { label: Description, name: description, widget: text }
              - { label: Skills, name: skills, widget: list, field: { label: Skill, widget: string } }
              - { label: Badge Image, name: image, widget: image }

      - name: journey
        label: Journey / Gallery
        file: public/data/gallery.json
        format: json
        fields:
          - label: Posts
            name: posts
            widget: list
            label_singular: Post
            summary: "{{fields.id}} — {{fields.title}} ({{fields.year}})"
            fields:
              - { label: ID, name: id, widget: number }
              - { label: Title, name: title, widget: string }
              - { label: Cover Image, name: image, widget: image }
              - { label: Location, name: location, widget: string }
              - { label: Date, name: date, widget: string }
              - { label: Caption, name: caption, widget: text }
              - { label: Hashtags, name: hashtags, widget: list, field: { label: Tag, widget: string }, required: false }
              - { label: Likes, name: likes, widget: number, default: 0, required: false }
              - { label: Comments, name: comments, widget: number, default: 0, required: false }
              - { label: Shares, name: shares, widget: number, default: 0, required: false }
              - { label: Year, name: year, widget: number }
              - label: Category
                name: category
                widget: select
                options:
                  - IEEE Events
                  - Hackathons
                  - Awards
                  - Workshops
                  - Competitions
                  - Other
              - { label: Album Name, name: album, widget: string, required: false }
              - { label: Album Images, name: albumImages, widget: list, field: { label: Image, widget: image }, min: 1 }
